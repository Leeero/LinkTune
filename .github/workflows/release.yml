name: Build and Release

on:
  push:
    branches:
      - main
    tags:
      - 'v*'

jobs:
  # Electron 桌面端构建
  build-desktop:
    strategy:
      matrix:
        include:
          - os: macos-latest
            platform: mac
          - os: windows-latest
            platform: win
          - os: ubuntu-latest
            platform: linux

    runs-on: ${{ matrix.os }}
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build and Package
        run: npm run dist -- --publish never

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.platform }}
          path: |
            release/*.dmg
            release/*.exe
            release/*.AppImage
            release/*.zip
          if-no-files-found: ignore

  # Android APK 构建
  build-android:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Java JDK
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          # 不使用 gradle 缓存，因为 android 目录是动态生成的

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm ci

      - name: Build web assets
        run: npm run build

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('android/**/*.gradle*', 'android/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Debug - Check web assets
        run: |
          echo "=== dist 目录内容 ==="
          ls -la dist/
          echo "=== dist 目录大小 ==="
          du -sh dist/
          echo "=== Android assets 目录 ==="
          ls -la android/app/src/main/assets/ || echo "assets 目录不存在"
          ls -la android/app/src/main/assets/public/ || echo "public 目录不存在"

      - name: Build Debug APK (signed)
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon

      - name: Debug - Check APK
        run: |
          echo "=== APK 文件 ==="
          find android -name "*.apk" -exec ls -lh {} \;
          echo "=== APK 内容检查 ==="
          if [ -f android/app/build/outputs/apk/debug/app-debug.apk ]; then
            echo "--- APK 文件列表 (前100行) ---"
            unzip -l android/app/build/outputs/apk/debug/app-debug.apk | head -100
            echo "--- 检查 assets/public 是否存在 ---"
            unzip -l android/app/build/outputs/apk/debug/app-debug.apk | grep -E "assets/public" | head -20
            echo "--- 检查 AndroidManifest.xml ---"
            unzip -p android/app/build/outputs/apk/debug/app-debug.apk AndroidManifest.xml | head -50 || echo "无法读取 manifest"
            echo "--- 验证 APK 签名 ---"
            $ANDROID_HOME/build-tools/35.0.0/apksigner verify --print-certs android/app/build/outputs/apk/debug/app-debug.apk || echo "签名验证失败"
          fi

      - name: Get version from package.json
        id: package-version
        run: echo "version=$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT

      - name: Rename APK files
        run: |
          mkdir -p release-apk
          if [ -f android/app/build/outputs/apk/debug/app-debug.apk ]; then
            cp android/app/build/outputs/apk/debug/app-debug.apk release-apk/LinkTune-${{ steps.package-version.outputs.version }}-android.apk
            echo "APK 大小:"
            ls -lh release-apk/
          else
            echo "错误: APK 文件不存在!"
            exit 1
          fi

      - name: Upload Android artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-android
          path: release-apk/*.apk
          if-no-files-found: error

  # 发布 Release
  release:
    needs: [build-desktop, build-android]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: find artifacts -type f | head -50

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
